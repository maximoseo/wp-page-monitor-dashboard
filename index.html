<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WP Page Monitor Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 WP Page Monitor</h1>
            <p class="subtitle">WordPress page monitoring & automated updates</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📄</div>
                <div class="stat-value" id="total-pages">0</div>
                <div class="stat-label">Total Pages</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-value" id="updated-pages">0</div>
                <div class="stat-label">Updated Pages</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏳</div>
                <div class="stat-value" id="pending-pages">0</div>
                <div class="stat-label">Pending Update</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">❌</div>
                <div class="stat-value" id="error-pages">0</div>
                <div class="stat-label">Errors</div>
            </div>
        </div>

        <div class="main-content">
            <div class="section">
                <h2>📋 Recent Scanned Pages</h2>
                <div class="table-container">
                    <table id="pages-table">
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>URL</th>
                                <th>Status</th>
                                <th>Scan Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="pages-tbody">
                            <tr><td colspan="5">Loading data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="section">
                <h2>🔄 Recent Activity</h2>
                <div id="activity-feed" class="activity-feed">
                    <div class="activity-item">Loading activity...</div>
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" onclick="scanAllPages()">
                🔍 Scan All Pages
            </button>
            <button class="btn btn-secondary" onclick="updatePendingPages()">
                ⬆️ Update Pending Pages
            </button>
            <button class="btn btn-secondary" onclick="exportReport()">
                📊 Export Report
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
