<!-- Paperclip Chat Widget -->
<div id="paperclip-chat" class="pc-chat-widget">
  <button id="pc-chat-toggle" class="pc-chat-toggle" title="Paperclip Chat">
    <span class="pc-icon">💬</span>
    <span class="pc-badge" id="pc-badge" style="display:none;">0</span>
  </button>
  
  <div id="pc-chat-panel" class="pc-chat-panel" style="display:none;">
    <div class="pc-chat-header">
      <div class="pc-chat-title">
        <span>📎</span>
        <span>Paperclip Assistant</span>
      </div>
      <div class="pc-chat-company" id="pc-company-name">MaximoSEO</div>
      <button id="pc-chat-close" class="pc-chat-close-btn">✕</button>
    </div>
    
    <div id="pc-chat-messages" class="pc-chat-messages">
      <div class="pc-message pc-system">
        <p>👋 שלום! שלח משימה ואעביר אותה לצוות Paperclip של <strong id="pc-company-msg">MaximoSEO</strong>.</p>
        <p style="margin-top:8px;font-size:12px;opacity:0.7;">דוגמאות: "בדוק את כל ה-workflows שנכשלו", "עדכן את דף הבית של galoz.co.il"</p>
      </div>
    </div>
    
    <div class="pc-chat-input-area">
      <textarea id="pc-chat-input" class="pc-chat-input" placeholder="כתוב משימה..." rows="2"></textarea>
      <button id="pc-chat-send" class="pc-chat-send-btn">
        <span>📤</span>
      </button>
    </div>
  </div>
</div>

<style>
.pc-chat-widget {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9999;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

.pc-chat-toggle {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, #7c5bf5, #9333ea);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(124,91,245,0.4);
  transition: all 0.3s;
  position: relative;
}

.pc-chat-toggle:hover {
  transform: scale(1.1);
  box-shadow: 0 6px 24px rgba(124,91,245,0.5);
}

.pc-icon { font-size: 24px; }

.pc-badge {
  position: absolute;
  top: -4px;
  right: -4px;
  background: #ef4444;
  color: white;
  font-size: 11px;
  font-weight: 700;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.pc-chat-panel {
  position: absolute;
  bottom: 70px;
  right: 0;
  width: 380px;
  height: 520px;
  background: #1a1a2e;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: pc-slide-up 0.3s ease;
}

@keyframes pc-slide-up {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.pc-chat-header {
  padding: 16px;
  background: linear-gradient(135deg, rgba(124,91,245,0.2), rgba(147,51,234,0.2));
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  gap: 8px;
}

.pc-chat-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 15px;
  color: #f0eff4;
  flex: 1;
}

.pc-chat-company {
  font-size: 11px;
  background: rgba(124,91,245,0.2);
  color: #a78bfa;
  padding: 2px 8px;
  border-radius: 8px;
  font-weight: 600;
}

.pc-chat-close-btn {
  background: none;
  border: none;
  color: #6b6780;
  cursor: pointer;
  font-size: 16px;
  padding: 4px;
}

.pc-chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.pc-message {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.5;
  animation: pc-fade-in 0.2s ease;
}

@keyframes pc-fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}

.pc-message.pc-user {
  align-self: flex-end;
  background: linear-gradient(135deg, #7c5bf5, #9333ea);
  color: white;
  border-bottom-right-radius: 4px;
}

.pc-message.pc-system {
  align-self: flex-start;
  background: rgba(255,255,255,0.05);
  color: #c4c0d8;
  border-bottom-left-radius: 4px;
}

.pc-message.pc-status {
  align-self: center;
  background: rgba(52,211,153,0.1);
  color: #34d399;
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 20px;
}

.pc-message.pc-error {
  align-self: center;
  background: rgba(239,68,68,0.1);
  color: #ef4444;
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 20px;
}

.pc-chat-input-area {
  padding: 12px;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.pc-chat-input {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 10px 12px;
  color: #f0eff4;
  font-size: 13px;
  font-family: inherit;
  resize: none;
  outline: none;
  transition: border-color 0.2s;
}

.pc-chat-input:focus {
  border-color: rgba(124,91,245,0.5);
}

.pc-chat-send-btn {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: linear-gradient(135deg, #7c5bf5, #9333ea);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.2s;
}

.pc-chat-send-btn:hover {
  transform: scale(1.05);
}

.pc-chat-send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Scrollbar */
.pc-chat-messages::-webkit-scrollbar { width: 4px; }
.pc-chat-messages::-webkit-scrollbar-track { background: transparent; }
.pc-chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

/* Responsive */
@media (max-width: 480px) {
  .pc-chat-panel {
    width: calc(100vw - 40px);
    height: calc(100vh - 120px);
    bottom: 70px;
    right: -10px;
  }
}
</style>

<script>
(function() {
  const PC_CONFIG = {
    company: document.querySelector('[data-pc-company]')?.dataset.pcCompany || 'MaximoSEO',
    dashboardName: document.title || 'Dashboard',
    telegramBotToken: '', // Will be set per deployment
    telegramChatId: '',   // Will be set per deployment
    pollInterval: 30000,  // Poll every 30 seconds for updates
  };

  const toggle = document.getElementById('pc-chat-toggle');
  const panel = document.getElementById('pc-chat-panel');
  const closeBtn = document.getElementById('pc-chat-close');
  const messages = document.getElementById('pc-chat-messages');
  const input = document.getElementById('pc-chat-input');
  const sendBtn = document.getElementById('pc-chat-send');
  const badge = document.getElementById('pc-badge');
  const companyNameEl = document.getElementById('pc-company-name');
  const companyMsgEl = document.getElementById('pc-company-msg');

  // Set company name
  if (companyNameEl) companyNameEl.textContent = PC_CONFIG.company;
  if (companyMsgEl) companyMsgEl.textContent = PC_CONFIG.company;

  // Task tracking
  let tasks = JSON.parse(localStorage.getItem('pc_tasks') || '[]');
  let unreadCount = 0;

  // Toggle panel
  toggle.addEventListener('click', () => {
    const isOpen = panel.style.display !== 'none';
    panel.style.display = isOpen ? 'none' : 'flex';
    if (!isOpen) {
      unreadCount = 0;
      badge.style.display = 'none';
      input.focus();
    }
  });

  closeBtn.addEventListener('click', () => {
    panel.style.display = 'none';
  });

  // Send message
  function addMessage(text, type = 'system') {
    const div = document.createElement('div');
    div.className = `pc-message pc-${type}`;
    div.innerHTML = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function saveTasks() {
    localStorage.setItem('pc_tasks', JSON.stringify(tasks));
  }

  async function sendTask() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    sendBtn.disabled = true;
    addMessage(text, 'user');

    const taskId = `TASK-${Date.now()}`;
    const task = {
      id: taskId,
      text: text,
      company: PC_CONFIG.company,
      dashboard: PC_CONFIG.dashboardName,
      status: 'sent',
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
    };

    tasks.push(task);
    saveTasks();

    addMessage(`⏳ שולח משימה <code>${taskId}</code> ל-${PC_CONFIG.company}...`, 'status');

    try {
      // Send to Telegram Bot
      const msg = `🆕 משימה חדשה מ-${PC_CONFIG.dashboardName}\n\n` +
                  `🏢 חברה: ${PC_CONFIG.company}\n` +
                  `📋 משימה: ${text}\n` +
                  `🆔 ID: ${taskId}`;

      if (PC_CONFIG.telegramBotToken && PC_CONFIG.telegramChatId) {
        const res = await fetch(`https://api.telegram.org/bot${PC_CONFIG.telegramBotToken}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: PC_CONFIG.telegramChatId,
            text: msg,
            parse_mode: 'HTML',
          }),
        });

        if (res.ok) {
          task.status = 'delivered';
          saveTasks();
          addMessage(`✅ המשימה נשלחה ל-Paperclip!\n<code>${taskId}</code>\n\nהצוות של <strong>${PC_CONFIG.company}</strong> יעדכן כשיבוצע.`, 'system');
        } else {
          throw new Error('Telegram API error');
        }
      } else {
        // Fallback: store locally and show confirmation
        task.status = 'queued';
        saveTasks();
        addMessage(`📨 המשימה נשמרה בתור!\n<code>${taskId}</code>\n\nתועבר ל-Paperclip כשהחיבור יהיה זמין.`, 'system');
      }
    } catch (err) {
      task.status = 'error';
      saveTasks();
      addMessage(`❌ שגיאה בשליחה. המשימה נשמרה מקומית ותישלח מאוחר יותר.`, 'error');
    }

    sendBtn.disabled = false;
    input.focus();
  }

  sendBtn.addEventListener('click', sendTask);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendTask();
    }
  });

  // Poll for task updates (check localStorage for updates from Paperclip)
  function checkUpdates() {
    const updatedTasks = JSON.parse(localStorage.getItem('pc_tasks') || '[]');
    updatedTasks.forEach(t => {
      const existing = tasks.find(x => x.id === t.id);
      if (existing && t.status !== existing.status) {
        existing.status = t.status;
        existing.result = t.result;
        if (t.status === 'completed') {
          addMessage(`✅ <strong>${t.id}</strong> בוצעה!\n${t.result || ''}`, 'status');
          if (panel.style.display === 'none') {
            unreadCount++;
            badge.textContent = unreadCount;
            badge.style.display = 'flex';
          }
        }
      }
    });
    tasks = updatedTasks;
  }

  setInterval(checkUpdates, PC_CONFIG.pollInterval);

  // Show pending tasks on load
  const pending = tasks.filter(t => t.status === 'sent' || t.status === 'queued');
  if (pending.length > 0) {
    addMessage(`📋 ${pending.length} משימ${pending.length > 1 ? 'ות' : 'ה'} ממתינ${pending.length > 1 ? 'ות' : 'ה'} לתשובה.`, 'status');
  }
})();
</script>
